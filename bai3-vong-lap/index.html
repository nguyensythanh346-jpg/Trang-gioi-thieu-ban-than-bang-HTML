<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bài 3: Vòng lặp</title>
</head>
<body>
<h1>Bài 3: Vòng lặp</h1>
<script>
    console.log("Các số từ 1 đến 20:");
    for (let i = 1; i <= 20; i++) {console.log(i);}
    let tong = 0;
    for (let i = 1; i <= 20; i++) {tong += i;}
    console.log("Tổng các số từ 1 đến 20 là: " + tong);
    console.log("Các số chẵn từ 1 đến 20:");
    for (let i = 1; i <= 20; i++) {if (i % 2 === 0) {console.log(i);}}
</script>
</body>
</html>
